server:
  port: 8083
  error:
    include-message: always
    
spring:
  config:
    import: optional:file:kafka.yml, optional:file:swagger.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/document_service}
      auto-index-creation: true  # managed programmatically via MongoIndexConfig

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: document-service-group
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

camergo:
  security:
    enabled: true
    disable-auto-security: false
    issuer: ${KEYCLOAK_ISSUER_URI:https://keycloak.4dealx.com/realms/master}
    jwkSetUri: ${KEYCLOAK_JWK_SET_URI:https://keycloak.4dealx.com/realms/master/protocol/openid-connect/certs}

scheduler:
  expiration:
    cron: "0 0 * * * *"   # every hour — override per env

swagger:
  enabled: true
springdoc:
  api-docs:
    enabled: true
    path: /api/v3/api-docs
  swagger-ui:
    #disable-swagger-default-url: true
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,mappings,*
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.camergo: INFO
    org.springframework:
      web.servlet.resource: DEBUG
      kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
