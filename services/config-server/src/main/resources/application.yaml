server:
  port: 8888
spring:
  profiles:
    active: native
  application:
    name: config-server
  cloud:
    config:
      server:
        #git:
        #  uri: ${CONFIG_REPO_URI:https://github.com/devtizi/camergo-config.git}
        #  username: ${CONFIG_REPO_USER:devtizi}
