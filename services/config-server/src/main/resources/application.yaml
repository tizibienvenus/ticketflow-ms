        #  clone-on-start: true
        #  search-paths:
        #    - '{application}'  # Recherche dans dossier du microservice
        #    - '{application}/config/*'  # Recherche dans config/
        #    - '{application}/profiles/*/*'  # Recherche dans profiles/
        #bootstrap: true
        #health:
        #  enabled: true
        #overrides:
        #  spring.cloud.config.enabled: true
        native:
          search-locations: file:/configurations/,classpath:/configurations/


# Monitoring
management:
  tracing:
    sampling:
      probability: 0.1   # 10% des requêtes

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: when_authorized

  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name}]"