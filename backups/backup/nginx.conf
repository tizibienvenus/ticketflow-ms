server {
    listen 80;
    server_name ewallet.4dealx.com;

    # Rediriger tout le trafic HTTP vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Pour Certbot HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name ewallet.4dealx.com;

    # Certificat généré par Certbot
    ssl_certificate /etc/letsencrypt/live/ewallet.4dealx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ewallet.4dealx.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Reverse proxy vers Keycloak
    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (pour certains flux Keycloak)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Pour Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
