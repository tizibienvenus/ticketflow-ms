version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: supersecurepassword
    volumes:
      - keycloak-db:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    environment:
      # Hostname v2
      KC_HOSTNAME: keycloak.ti.com
      KC_HOSTNAME_STRICT: "false"  # ou "true" si tu veux le strict
      KC_PROXY: edge

      # Proxy settings
      KC_PROXY_HEADERS: forwarded
      
      # HTTP settings  
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      
      # Database
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: supersecurepassword
      
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: supersecureadminpassword
    depends_on:
      - postgres
    command: 
      - start
      # - --optimized
    ports:
      - "127.0.0.1:8085:8080"

volumes:
  keycloak-db:
