name: Build and Deploy Camergo - Matrix

on:
  push:
    branches: [ main, dev-tizi ]
    
permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  # 1) Construction et push de chaque service en parallèle
  build-service:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - config-server
          - discovery-service
          - api-gateway
          - documentations-aggregator
          - document-service
          - identity-service
          - meta-service
          - notification-service
          - dispatch-service
          - demo-service
      # Évite d'annuler tous les jobs si l'un échoue (optionnel)
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  # ← active le cache des dépendances Maven

      # Optionnel : ne compiler que le module concerné (si structure multi-module)
      - name: Build Maven module ${{ matrix.service }}
        run: |
          cd services
          mvn clean package -DskipTests -pl ${{ matrix.service }} -am
          cd ..

      - name: Build Docker image for ${{ matrix.service }}
        run: |
          docker compose build --no-cache ${{ matrix.service }}

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push ${{ matrix.service }} to both registries
        run: |
          SOURCE_IMAGE="tizibienvenus/camergo-${{ matrix.service }}:latest"
          # Docker Hub
          docker tag ${SOURCE_IMAGE} docker.io/${{ secrets.DOCKER_USER }}/camergo-${{ matrix.service }}:latest
          docker push docker.io/${{ secrets.DOCKER_USER }}/camergo-${{ matrix.service }}:latest &
          # GHCR
          docker tag ${SOURCE_IMAGE} ghcr.io/${{ github.actor }}/camergo-${{ matrix.service }}:latest
          docker push ghcr.io/${{ github.actor }}/camergo-${{ matrix.service }}:latest &
          wait
          echo "✅ ${{ matrix.service }} pushed"

    # 3) Analyse de la qualité du code (SonarCloud)
  code-quality:
    runs-on: ubuntu-latest
    needs: build-service   # attend la compilation de tous les services
    if: success()          # ne s'exécute que si le build a réussi
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0    # nécessaire pour Sonar (analyse complète de l'historique)

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze with SonarCloud
        run: |
          cd services
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=Smart-Innovation-Plus_camergo-microservices \
            -Dsonar.organization=smart-innovation-plus \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -DskipTests=true  # exécuter les tests pour la couverture
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 4) Scan de vulnérabilités des images Docker (Trivy)
  image-scan:
    runs-on: ubuntu-latest
    needs: build-service
    if: success()
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      matrix:
        service:
          - config-server
          - discovery-service
          - api-gateway
          - documentations-aggregator
          - document-service
          - identity-service
          - meta-service
          - notification-service
          - dispatch-service
          - demo-service
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        if: ${{ vars.ENABLE_CODE_SCANNING_UPLOAD == 'true' }}

      - name: Pull Docker image
        run: docker pull docker.io/${{ secrets.DOCKER_USER }}/camergo-${{ matrix.service }}:latest
      
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ secrets.DOCKER_USER }}/camergo-${{ matrix.service }}:latest
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      
      - name: Upload SARIF
        if: ${{ vars.ENABLE_CODE_SCANNING_UPLOAD == 'true' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Upload Trivy SARIF Artifact
        if: ${{ vars.ENABLE_CODE_SCANNING_UPLOAD != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: trivy-results-${{ matrix.service }}
          path: trivy-results-${{ matrix.service }}.sarif
          retention-days: 14
  
  # 2) Déploiement sur le serveur (après tous les builds)
  deploy:
    runs-on: ubuntu-latest
    needs: build-service  # attend que TOUS les services soient construits et pushés
    steps:
      - name: Test SSH connectivity
        run: nc -zv ${{ secrets.SERVER_HOST }} 22

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/camergo || mkdir -p /opt/camergo && cd /opt/camergo
            git pull || echo "No repo found, skipping git pull"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tizibienvenus --password-stdin
            docker compose down
            docker compose pull
            docker compose up -d --force-recreate
